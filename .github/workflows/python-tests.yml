name: Python Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov numpy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run tests with pytest
      run: |
        # Run tests if tests directory exists
        if [ -d "tests" ]; then
          pytest tests/ -v --cov=Library --cov-report=xml --cov-report=term
        else
          echo "No tests directory found. Skipping tests."
          # Validate Python syntax for all files
          python -m py_compile Library/Data-structures/trie-search-autocomplete/core/trie.py
          python -m py_compile Library/Graph-Theory/dijkstra-delivery-optimizer/core/dijkstra.py
          python -m py_compile Library/Graph-Theory/a-star-pathfinder/core/astar.py
          python -m py_compile Library/Machine-Learning/k-means-product-clustering/core/kmeans.py
          echo "All Python files compiled successfully!"
        fi

    - name: Upload coverage reports
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
